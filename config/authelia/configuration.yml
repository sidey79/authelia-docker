theme: auto

default_2fa_method: totp

server:
  address: tcp://0.0.0.0:9091

log:
  level: info

identity_validation:
  reset_password: {}

authentication_backend:
  file:
    path: /config/users_database.yml

access_control:
  default_policy: deny
  rules:
    - domain: "*.example.com"
      policy: one_factor

session:
  name: authelia_session
  cookies:
    - name: authelia_session
      domain: example.com
      authelia_url: https://auth.example.com
      default_redirection_url: https://workflow.example.com
  redis:
    host: redis
    port: 6379

storage:
  postgres:
    address: tcp://postgresql:5432
    database: authelia
    username: authelia

notifier:
  smtp:
    subject: "[Authelia] {title}"
